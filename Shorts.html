<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts - Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* NAV (HOME ONLY) */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 240px;

  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(15px);

  overflow: hidden;

  cursor: pointer;

  transition: 0.25s;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.4);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXT */
.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

/* NOTE */
.note {
  text-align: center;
  opacity: 0.6;
  margin: 20px;
}
</style>
</head>

<body>

<!-- NAV (HOME ONLY) -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Shorts</h1>
  <p>Custom summer and patchwork shorts.</p>
</div>

<!-- PRODUCT -->
<div class="grid">

  <div class="card" onclick="location.href='/products/shorts/camo-fragment-shorts'">
    <img src="https://i.imgur.com/Y1zxInG.jpeg">
    <div class="content">
      <div class="title">Camo Fragment Shorts — 1/1</div>
    </div>
  </div>

</div>

<!-- NOTE -->
<div class="note">
More pieces coming soon. Customize your own clothing — eight888studios@gmail.com
</div>

</body>
</html>
