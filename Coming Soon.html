<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon - Eight Studios</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;

  background: url('https://eightstudios.org/the-world-is-yours-ship.gif') no-repeat center center/cover;
}

/* Dark overlay */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0,200,255,0.2);
  width: 90%;
  max-width: 500px;
}

h1 {
  font-size: 42px;
  margin-bottom: 25px; /* adjusted spacing */
  letter-spacing: 2px;
}

input {
  padding: 12px;
  width: 70%;
  border-radius: 25px;
  border: none;
  outline: none;
  margin-right: 10px;
}

button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, #00c8ff, #0077ff);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>COMING SOON</h1>

  <div>
    <input type="email" placeholder="Enter your email">
    <button>Notify Me</button>
  </div>

  <div class="footer">
    © 2026 Eight Studios
  </div>
</div>

<script>
const launchDate = new Date("May 20, 2026 00:00:00").getTime();
const redirectURL = "https://eightstudios.org";

setInterval(() => {
  const now = new Date().getTime();
  if (now >= launchDate) {
    window.location.href = redirectURL;
  }
}, 1000);
</script>

</body>
</html>
