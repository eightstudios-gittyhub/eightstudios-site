<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #00111a, #000);
  color:white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(15px);
}

.nav h1 {
  margin:0 auto;
  font-size:22px;
  letter-spacing:2px;
  background: linear-gradient(90deg,#00ffcc,#00aaff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* HOME BUTTON */
.home-btn {
  position:absolute;
  left:20px;
  padding:8px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  text-decoration:none;
  font-size:14px;
}

.home-btn:hover {
  background:rgba(0,255,204,0.2);
}

/* LOGO */
.logo {
  text-align:center;
  margin-top:20px;
}

.logo img {
  height:80px;
  filter: drop-shadow(0 0 15px #00ffcc55);
}

/* HEADER */
.header {
  text-align:center;
  padding:10px 20px;
}

.header h2 {
  font-size:38px;
}

.header p {
  opacity:0.6;
}

/* EMBED BOX */
.embed-box {
  position:relative;
  margin:20px;
  height:70vh;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(0,255,204,0.1);
}

/* IFRAME */
iframe {
  width:100%;
  height:100%;
  border:none;
}

/* FALLBACK */
.fallback {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

.fallback button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="/" class="home-btn">← Home</a>
  <h1>EIGHT STUDIOS</h1>
</div>

<!-- LOGO -->
<div class="logo">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
</div>

<!-- HEADER -->
<div class="header">
  <h2>Customer Reviews</h2>
  <p>Real feedback from our community</p>
</div>

<!-- EMBED -->
<div class="embed-box">
  <iframe id="reviewFrame" src="https://share.google/VqFNKC9AfITJGFnIs"></iframe>

  <!-- FALLBACK IF BLOCKED -->
  <div class="fallback" id="fallback" style="display:none;">
    <p>Reviews can’t load inside the page</p>
    <button onclick="window.open('https://share.google/VqFNKC9AfITJGFnIs','_blank')">
      View Reviews
    </button>
  </div>
</div>

<script>
// detect if iframe fails
const iframe = document.getElementById("reviewFrame");
const fallback = document.getElementById("fallback");

setTimeout(() => {
  try {
    if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
      fallback.style.display = "flex";
    }
  } catch (e) {
    fallback.style.display = "flex";
  }
}, 3000);
</script>

</body>
</html>
