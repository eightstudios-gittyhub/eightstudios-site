<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shorts - Eight Studios</title>

<meta property="og:title" content="Eight Studios — Custom Shorts">
<meta property="og:description" content="Custom summer and patchwork shorts. Limited 1/1 drops only.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org/shorts.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<meta name="theme-color" content="#00c8ff">

<link rel="icon" type="image/png" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* 🔥 LOADING SCREEN */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
}

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 20px;
  font-weight: bold;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: auto;
}

.progress {
  width: 0%;
  height: 100%;
  background: rgba(0,200,255,0.8);
  animation: load 2s ease forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* LOGO */
.logo-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-wrap img {
  width: 120px;
  filter: drop-shadow(0 0 12px rgba(0,200,255,0.6));
  transition: 0.3s;
}

.logo-wrap img:hover {
  transform: scale(1.05);
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  margin: 10px 0 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 240px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  overflow: hidden;
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.price {
  margin-top: 6px;
  font-size: 14px;
  font-weight: bold;
  color: #00c8ff;
  text-shadow: 0 0 8px rgba(0,200,255,0.4);
}

.checkout-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
  color: white;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
}

.checkout-btn:hover {
  background: rgba(0,200,255,0.35);
}

.note {
  text-align: center;
  opacity: 0.6;
  margin: 20px;
}
</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">

    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">

    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Shorts...</div>

    <div class="bar">
      <div class="progress"></div>
    </div>

  </div>
</div>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="logo-wrap">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" alt="Logo">
</div>

<div class="header">
  <h1>Shorts</h1>
  <p>Custom summer and patchwork shorts will appear here as new drops release.</p>
</div>

<div class="grid">

  <div class="card" onclick="window.open('https://buy.stripe.com/6oU7sN0kv5Oy1Jx98K5Rm0e', '_blank')">
    <img src="https://i.imgur.com/Y1zxInG.jpeg">

    <div class="content">
      <div class="title">Camo Fragment Shorts — 1/1</div>
      <div class="subtitle">Custom summer drop</div>

      <div class="price">$128.00</div>

      <a href="https://buy.stripe.com/6oU7sN0kv5Oy1Jx98K5Rm0e"
         class="checkout-btn"
         target="_blank"
         onclick="event.stopPropagation()">
         Checkout
      </a>
    </div>
  </div>

</div>

<div class="note">
More pieces coming soon. Customize your own clothing — eight888studios@gmail.com
</div>

<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");

  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1800);
});
</script>

</body>
</html>
