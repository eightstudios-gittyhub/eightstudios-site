<head>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align:center; }

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text { font-size:20px; font-weight:bold; }
.loader-sub { font-size:12px; opacity:0.6; margin-bottom:15px; }

.bar {
  width:200px;
  height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

.progress {
  width:0%;
  height:100%;
  background:#00c8ff;
  animation:load 2s forwards;
}

@keyframes load { to { width:100%; } }
@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08); opacity:0.7;}
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* LOGO */
.logo-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-wrap img {
  width: 120px;
  filter: drop-shadow(0 0 12px rgba(0,200,255,0.6));
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  margin: 10px 0 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 240px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  overflow: hidden;
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.price {
  margin-top: 6px;
  font-size: 14px;
  font-weight: bold;
  color: #00c8ff;
  text-shadow: 0 0 8px rgba(0,200,255,0.4);
}

/* BUTTON */
.checkout-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
  color: white;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
}

.checkout-btn:hover {
  background: rgba(0,200,255,0.35);
}

.note {
  text-align: center;
  opacity: 0.6;
  margin: 20px;
}

/* CHAT BUTTON */
.chat-btn {
  position: fixed;
  bottom: 18px;
  left: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.chat-popup {
  position: fixed;
  bottom: 90px;
  left: 18px;
  width: 320px;
  height: 450px;
  border-radius: 14px;
  overflow: hidden;
  display: none;
  z-index: 9999;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.chat-popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ================= FOOTER ================= */
.footer {
  margin-top: 40px;
  padding: 25px 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  text-align: center;
}

.footer-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 10px;
}

.icon-btn {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 18px;
  background: rgba(255,255,255,0.1);
  color: white;
}

.icon-btn:hover {
  background: rgba(0,200,255,0.3);
}

.insta-btn {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.insta-btn svg {
  width: 22px;
  height: 22px;
  fill: white;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- LOADING -->

  <div class="loader-box">

    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Shorts...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="https://eightstudios.org">Home</a>
</div>

<!-- HEADER -->
<div class="logo-wrap">

<div class="header">
  <h1>Shorts</h1>

<div class="grid">

  <div class="card" onclick="window.open('https://buy.stripe.com/6oU7sN0kv5Oy1Jx98K5Rm0e', '_blank')">

    <div class="content">
      <div class="title">Camo Fragment Shorts — 1/1</div>

      <div class="price">$128.00</div>

      <a href="https://buy.stripe.com/6oU7sN0kv5Oy1Jx98K5Rm0e"
         class="checkout-btn"
         target="_blank"
         onclick="event.stopPropagation()">
         Checkout
      </a>

    <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>


    <button class="insta-btn" onclick="openInstagram()">
      <svg viewBox="0 0 24 24">
        <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
        <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
      </svg>
    </button>

  </div>

  <div class="footer-text">© 2026 Eight Studios</div>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatPopup" class="chat-popup">
  <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"></iframe>
</div>

<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1800);
});

function toggleChat(){
  const chat = document.getElementById("chatPopup");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}


function openInstagram(){
  window.open("https://instagram.com/eight888studios", "_blank");
}
</script>

</body>
</html>
