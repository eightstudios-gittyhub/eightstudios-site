<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hats - Eight Studios</title>

<meta property="og:title" content="Hats - Eight Studios">
<meta property="og:description" content="Explore custom hat drops from Eight Studios. More coming soon.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org/hats.html">

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* ================= LOADING SCREEN ================= */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
}

.loader-logo {
  width: 85px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 20px;
  font-weight: bold;
  color: white;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
  color: white;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: auto;
}

.progress {
  width: 0%;
  height: 100%;
  background: #00c8ff;
  animation: load 2s ease forwards;
}

@keyframes load {
  to { width: 100%; }
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.6; }
}

/* ================= PAGE ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.logo {
  width: 120px;
  max-width: 40%;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 10px rgba(0,200,255,0.6));
}

.header {
  text-align: center;
  padding: 40px 20px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

.empty {
  text-align: center;
  margin-top: 40px;
  opacity: 0.6;
  font-size: 18px;
}

.note {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  opacity: 0.8;
}

.note a {
  color: #00c8ff;
  text-decoration: none;
}

</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Hats...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <h1>Hats</h1>
  <p>Custom hat drops will appear here.</p>
</div>

<!-- EMPTY -->
<div class="empty">
  More items coming soon.
</div>

<!-- FOOTER -->
<div class="note">
Contact: <a href="mailto:eight888studios@gmail.com">eight888studios@gmail.com</a>
</div>

<script src="/pwa-register.js" defer></script>

<!-- 🔥 LOADING SCRIPT -->
<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");

  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1500);
});
</script>

</body>
</html>
