<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  background:#0d1117;
  color:white;
  font-family:Arial;
  padding:20px;
}

.card {
  background:#161b22;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>📡 Eight Studios Admin</h1>
<h3 id="count">Loading...</h3>

<div id="logs"></div>

<script>
async function load() {
  const res = await fetch("/api/visits");
  const data = await res.json();

  document.getElementById("count").innerText =
    data.length + " Visitors";

  document.getElementById("logs").innerHTML =
    data.map(v => `
      <div class="card">
        <b>IP:</b> ${v.ip}<br>
        <b>Time:</b> ${v.time}<br>
        <b>Device:</b> ${v.userAgent}
      </div>
    `).join("");
}

load();
setInterval(load, 3000);
</script>

</body>
</html>
