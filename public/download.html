<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

nav a {
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* MAIN */
main {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding-top: 80px;
}

h1 {
  font-size: 32px;
}

/* BUTTON */
.download-btn {
  width: 240px;
  padding: 14px;
  text-align: center;
  border-radius: 12px;
  font-weight: 700;
  text-decoration: none;
  color: black;
  background: white;
  cursor: pointer;
}

.secondary {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
}

/* ================= INSTALL MODAL ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-box {
  width: 320px;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}

.modal-box h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

.modal-box p {
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.4;
}

.steps {
  text-align: left;
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.85;
}

.close-btn {
  margin-top: 15px;
  padding: 10px;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="https://eightstudios.org">HOME</a>
</nav>

<!-- MAIN -->
<main>
  <h1>DOWNLOADS</h1>

  <!-- ANDROID BUTTON -->
  <div class="download-btn" onclick="openInstallGuide()">
    DOWNLOAD FOR ANDROID
  </div>

  <!-- IOS -->
  <div class="download-btn secondary">
    DOWNLOAD FOR IOS (COMING SOON)
  </div>
</main>

<!-- INSTALL MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2>INSTALL INSTRUCTIONS</h2>
    <p>Follow these steps before installing Eight Studios APK</p>

    <div class="steps">
      1. Download the APK<br>
      2. Open your Files app<br>
      3. Tap the downloaded file<br>
      4. Enable “Install Unknown Apps”<br>
      5. Install & open app
    </div>

    <div class="close-btn" onclick="downloadAPK()">
      CONTINUE DOWNLOAD
    </div>

    <div class="close-btn" style="background:#333;color:white;margin-top:10px;" onclick="closeModal()">
      CANCEL
    </div>

  </div>
</div>

<script>
const apkLink = "https://eightstudios.org/app-release%20(1).apk";

function openInstallGuide() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function downloadAPK() {
  window.location.href = apkLink;
}
</script>

</body>
</html>
