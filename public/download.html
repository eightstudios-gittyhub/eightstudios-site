<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 0;
}

/* LOADING SCREEN */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align: center; }

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text { font-size: 20px; font-weight: bold; }

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: #00c8ff;
  animation: load 2s forwards;
}

@keyframes load { to { width: 100%; } }

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99998;
  transition: opacity 0.6s ease;
}

#splash img {
  width: 90px;
  animation: pulse 1.2s infinite;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

nav a {
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  font-size: 14px;
}

/* MAIN */
main {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding-top: 80px;
}

h1 { font-size: 32px; letter-spacing: 2px; }

/* BUTTONS */
.download-btn {
  width: 240px;
  padding: 14px;
  text-align: center;
  border-radius: 12px;
  font-weight: 700;
  color: black;
  background: white;
  cursor: pointer;
}

.download-btn:hover { background: #dcdcdc; transform: translateY(-3px); }

.secondary {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

.modal-box {
  width: 320px;
  background: #111;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}

.steps {
  text-align: left;
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.85;
}

.close-btn {
  margin-top: 15px;
  padding: 10px;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* CHAT */
.chat-btn {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 99999;
}

.chat-popup {
  position: fixed;
  bottom: 90px;
  right: 18px;
  width: 320px;
  height: 450px;
  border-radius: 14px;
  overflow: hidden;
  display: none;
  z-index: 99999;
}

.chat-popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* COPYRIGHT */
.copyright {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 25px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Eight Studios Downloads...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- SPLASH -->
<div id="splash">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
</div>

<!-- NAV -->
<nav>
  <a href="https://eightstudios.org">HOME</a>
</nav>

<!-- MAIN -->
<main>
  <h1>DOWNLOAD</h1>

  <div class="download-btn" onclick="openAndroid()">Download For ANDROID</div>
  <div class="download-btn secondary" onclick="openIOS()">Download For IOS</div>
</main>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <div class="steps" id="modalSteps"></div>

    <div class="close-btn" onclick="actionMain()">CONTINUE</div>
    <div class="close-btn" style="background:#333;color:white;" onclick="closeModal()">CLOSE</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatPopup" class="chat-popup">
  <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"></iframe>
</div>

<!-- COPYRIGHT -->
<div class="copyright">
  © 2026 Eight Studios. All rights reserved.
</div>

<script>
const apkLink = "https://eightstudios.org/app-release%20(1).apk";
let mode = "";

window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loadingScreen").style.opacity = "0";
    setTimeout(() => document.getElementById("loadingScreen").remove(), 600);
  }, 1800);

  setTimeout(() => {
    document.getElementById("splash").style.opacity = "0";
    document.getElementById("splash").style.visibility = "hidden";
  }, 1500);
});

function openAndroid(){
  mode = "android";
  modalTitle.innerText = "ANDROID INSTALL";
  modalDesc.innerText = "Install APK file";
  modalSteps.innerHTML = "1. Download APK<br>2. Open Files<br>3. Tap file<br>4. Allow unknown apps<br>5. Install";
  modal.style.display = "flex";
}

function openIOS(){
  mode = "ios";
  modalTitle.innerText = "IOS PWA INSTALL";
  modalDesc.innerText = "Add to Home Screen";
  modalSteps.innerHTML = "1. Open Safari<br>2. Tap Share<br>3. Add to Home Screen<br>4. Confirm";
  modal.style.display = "flex";
}

function closeModal(){
  modal.style.display = "none";
}

function actionMain(){
  if(mode === "android") window.location.href = apkLink;
  if(mode === "ios") window.location.href = "https://eightstudios.org";
}

function toggleChat(){
  const chat = document.getElementById("chatPopup");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
