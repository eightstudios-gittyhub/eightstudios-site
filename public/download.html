<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 0;
}

/* ================= SPLASH SCREEN ================= */
#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

#splash img {
  width: 90px;
  animation: splashPulse 1.2s ease-in-out infinite;
}

@keyframes splashPulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

nav a {
  color: white;
  text-decoration: none;
  padding: 10px 18px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  font-size: 14px;
  letter-spacing: 2px;
  transition: 0.3s;
}

nav a:hover {
  border-color: white;
  transform: translateY(-2px);
}

/* MAIN */
main {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding-top: 80px;
}

h1 {
  font-size: 32px;
  letter-spacing: 2px;
}

/* BUTTONS */
.download-btn {
  width: 240px;
  padding: 14px;
  text-align: center;
  border-radius: 12px;
  font-weight: 700;
  text-decoration: none;
  color: black;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

.download-btn:hover {
  background: #dcdcdc;
  transform: translateY(-3px);
}

.secondary {
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-box {
  width: 320px;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}

.modal-box h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

.modal-box p {
  font-size: 13px;
  opacity: 0.7;
  line-height: 1.4;
}

.steps {
  text-align: left;
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.85;
}

.close-btn {
  margin-top: 15px;
  padding: 10px;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* FOOTER */
footer {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 30px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- ⚡ SPLASH -->
<div id="splash">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
</div>

<!-- NAV -->
<nav>
  <a href="https://eightstudios.org">HOME</a>
</nav>

<!-- MAIN -->
<main>
  <h1>DOWNLOAD</h1>

  <!-- ANDROID -->
  <div class="download-btn" onclick="openAndroid()">
    DOWNLOAD FOR ANDROID
  </div>

  <!-- IOS -->
  <div class="download-btn secondary" onclick="openIOS()">
    DOWNLOAD FOR IOS
  </div>
</main>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>

    <div class="steps" id="modalSteps"></div>

    <div class="close-btn" onclick="actionMain()">CONTINUE</div>
    <div class="close-btn" style="background:#333;color:white;" onclick="closeModal()">CLOSE</div>

  </div>
</div>

<footer>
  © 2026 Eight Studios
</footer>

<script>
const apkLink = "https://eightstudios.org/app-release%20(1).apk";
let mode = "";

/* SPLASH */
window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    splash.style.opacity = "0";
    splash.style.visibility = "hidden";
  }, 1500);
});

/* MODALS */
function openAndroid(){
  mode = "android";
  document.getElementById("modalTitle").innerText = "ANDROID INSTALL";
  document.getElementById("modalDesc").innerText = "Install Eight Studios APK";
  document.getElementById("modalSteps").innerHTML =
    "1. Download APK<br>2. Open Files<br>3. Tap file<br>4. Allow unknown apps<br>5. Install";
  document.getElementById("modal").style.display = "flex";
}

function openIOS(){
  mode = "ios";
  document.getElementById("modalTitle").innerText = "IOS PWA INSTALL";
  document.getElementById("modalDesc").innerText = "Add Eight Studios to home screen";
  document.getElementById("modalSteps").innerHTML =
    "1. Open Safari<br>2. Tap Share button<br>3. Add to Home Screen<br>4. Confirm install";
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function actionMain(){
  if(mode === "android"){
    window.location.href = apkLink;
  }
  if(mode === "ios"){
    window.location.href = "https://eightstudios.org";
  }
}
</script>

</body>
</html>
