<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodies - Eight Studios</title>

<link rel="icon" type="image/png" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta property="og:title" content="Eight Studios - Hoodies" />
<meta property="og:description" content="Handmade 1/1 hooded garments by Eight Studios." />
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png" />
<meta property="og:url" content="https://eightstudios.org" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align:center; }

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text { font-size:20px; font-weight:bold; }
.loader-sub { font-size:12px; opacity:0.6; margin-bottom:15px; }

.bar {
  width:200px;
  height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

.progress {
  width:0%;
  height:100%;
  background:#00c8ff;
  animation:load 2s forwards;
}

@keyframes load { to { width:100%; } }
@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08); opacity:0.7;}
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* LOGO */
.logo-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-wrap img {
  width: 120px;
  filter: drop-shadow(0 0 12px rgba(0,200,255,0.6));
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  margin: 10px 0 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  justify-content: center;
  padding: 30px;
}

/* CARD */
.card {
  width: 240px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 12px;
  text-align: left;
}

.title { font-weight: bold; }

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.price {
  margin-top: 12px;
  margin-bottom: 8px;
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: #00c8ff;
}

.checkout-btn {
  display: inline-block;
  margin-top: 6px;
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
  color: white;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
}

.checkout-btn:hover {
  background: rgba(0,200,255,0.35);
}

/* CHAT */
.chat-fab {
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c8ff,#0077ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#chatBadge {
  position:absolute;
  top:0;
  right:0;
  transform:translate(30%,-30%);
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  color:white;
  font-size:12px;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.chat-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:10000;
}

.chat-box {
  width:100%;
  max-width:420px;
  height:75vh;
  background:#111;
  border-radius:18px 18px 0 0;
  overflow:hidden;
}

.chat-header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1c1c1c;
}

.chat-header button {
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.chat-frame {
  width:100%;
  height:calc(100% - 48px);
  border:none;
}

/* ================= FOOTER ================= */
.footer {
  margin-top: 40px;
  padding: 25px 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  text-align: center;
}

.footer-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 10px;
}

.icon-btn {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 18px;
  background: rgba(255,255,255,0.1);
  color: white;
}

.icon-btn:hover {
  background: rgba(0,200,255,0.3);
}

.insta-btn {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.insta-btn svg {
  width: 22px;
  height: 22px;
  fill: white;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Hoodies...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="https://eightstudios.org">Home</a>
</div>

<!-- HEADER -->
<div class="logo-wrap">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
</div>

<div class="header">
  <h1>Hoodies</h1>
  <p>Handmade 1/1 hooded garments by Eight Studios.</p>
</div>

<!-- PRODUCT -->
<div class="grid">

  <div class="card">
    <img src="https://i.imgur.com/pIeNzKp.jpeg">

    <div class="content">
      <div class="title">888 Heavyweight Zipup — 1/1</div>
      <div class="subtitle">Handmade zip-up hoodie</div>
      <div class="price">$158.00</div>

      <a class="checkout-btn" href="https://buy.stripe.com/28EfZj4AL90K87V70C5Rm0d" target="_blank">
        Checkout
      </a>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-buttons">

    <button class="icon-btn" onclick="window.location.href='tel:+15184770592'">📞</button>

    <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>


    <button class="insta-btn" onclick="openInstagram()">
      <svg viewBox="0 0 24 24">
        <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
        <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
      </svg>
    </button>

  </div>

  <div class="footer-text">© 2026 Eight Studios</div>
</div>

<!-- 💬 CHAT -->
<div class="chat-fab" onclick="openChat()">💬
  <span id="chatBadge">0</span>
</div>

<div id="chatModal" class="chat-modal">
  <div class="chat-box">

    <div class="chat-header">
      <span>Eight Studios Chat</span>
      <button onclick="closeChat()">✕</button>
    </div>

    <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
      class="chat-frame"></iframe>

  </div>
</div>

<script>
function openChat(){
  document.getElementById("chatModal").style.display = "flex";
}

function closeChat(){
  document.getElementById("chatModal").style.display = "none";
}


function openInstagram(){
  window.open("https://instagram.com/eight888studios", "_blank");
}

/* LOADING */
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1800);
});
</script>

</body>
</html>
