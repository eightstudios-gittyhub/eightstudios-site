<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodies - Eight Studios</title>

<link rel="icon" type="image/png" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta property="og:title" content="Eight Studios - Hoodies" />
<meta property="og:description" content="Handmade 1/1 hooded garments by Eight Studios." />
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png" />
<meta property="og:url" content="https://eightstudios.org" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* 🔥 LOADING SCREEN */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
}

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 20px;
  font-weight: bold;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: auto;
}

.progress {
  width: 0%;
  height: 100%;
  background: rgba(0,200,255,0.8);
  animation: load 2s ease forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* LOGO */
.logo-wrap {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.logo-wrap img {
  width: 120px;
  filter: drop-shadow(0 0 12px rgba(0,200,255,0.6));
  transition: 0.3s;
}

.logo-wrap img:hover {
  transform: scale(1.05);
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  margin: 10px 0 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 240px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  overflow: hidden;
  transition: 0.25s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.price {
  margin-top: 6px;
  font-size: 14px;
  font-weight: bold;
  color: #00c8ff;
}

.checkout-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
  color: white;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
}

.checkout-btn:hover {
  background: rgba(0,200,255,0.35);
}

/* NOTE */
.note {
  text-align: center;
  opacity: 0.7;
  padding: 30px;
}
</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">

    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">

    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Hoodies...</div>

    <div class="bar">
      <div class="progress"></div>
    </div>

  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="logo-wrap">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" alt="Logo">
</div>

<div class="header">
  <h1>Hoodies</h1>
  <p>Handmade 1/1 hooded garments by Eight Studios.</p>
</div>

<div class="grid">

  <div class="card" onclick="window.open('https://buy.stripe.com/28EfZj4AL90K87V70C5Rm0d', '_blank')">
    <img src="https://i.imgur.com/pIeNzKp.jpeg">

    <div class="content">
      <div class="title">888 Heavyweight Zipup — 1/1</div>
      <div class="subtitle">Handmade zip-up hoodie</div>

      <div class="price">$158.00</div>

      <a href="https://buy.stripe.com/28EfZj4AL90K87V70C5Rm0d"
         target="_blank"
         class="checkout-btn"
         onclick="event.stopPropagation()">
         Checkout
      </a>
    </div>
  </div>

</div>

<div class="note">
Contact: <a href="mailto:eight888studios@gmail.com" style="color:#00c8ff;text-decoration:none;">eight888studios@gmail.com</a>
</div>

<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");

  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1800);
});
</script>

<script src="/pwa-register.js" defer></script>

</body>
</html>
