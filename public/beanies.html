<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 230px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  overflow: hidden;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.4);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TEXT */
.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

/* NOTE */
.note {
  text-align: center;
  opacity: 0.6;
  margin: 20px;
}

/* LINK RESET */
.card-link {
  text-decoration: none;
  color: inherit;
  display: block;
}
</style>
</head>

<body>
