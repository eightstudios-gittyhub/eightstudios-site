<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* ================= LOADING ================= */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align:center; }

.loader-logo {
  width: 85px;
  margin-bottom: 10px;
}

.loader-text { color:white; font-weight:bold; font-size:20px; }
.loader-sub { color:white; opacity:0.6; font-size:12px; margin-bottom:15px; }

.bar {
  width:200px;
  height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

.progress {
  width:0%;
  height:100%;
  background:#00c8ff;
  animation:load 2s forwards;
}

@keyframes load { to { width:100%; } }

/* ================= PAGE ================= */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

.container {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 110px;
  margin-bottom: 15px;
}

h1 {
  font-size: 40px;
  margin: 10px 0;
}

p {
  opacity: 0.7;
  font-size: 14px;
}

/* ================= COUNTDOWN ================= */
.countdown {
  margin-top: 15px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
  color: #00c8ff;
}

.countdown small {
  display:block;
  font-size:12px;
  opacity:0.6;
  margin-top:5px;
}

button {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* ================= CHAT ================= */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.chat-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 10000;
}

.chat-box {
  width: 100%;
  max-width: 420px;
  height: 75vh;
  background: #111;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
}

.chat-header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #1c1c1c;
}

.chat-header button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.chat-frame {
  width: 100%;
  height: calc(100% - 48px);
  border: none;
}

/* ================= FOOTER ================= */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  text-align: center;
}

.footer-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 8px;
}

.icon-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

.icon-btn:hover {
  transform: scale(1.1);
}

.insta-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.insta-btn img {
  width: 22px;
  height: 22px;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Coming Soon...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<div class="container">

  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">

  <h1>Coming Soon</h1>
  <p>Something new is on the way from Eight Studios.</p>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown">
    Loading timer...
    <small>Until launch</small>
  </div>

  <button onclick="window.location.href='https://eightstudios.org'">
    Return Home
  </button>

</div>

<!-- CHAT -->
<div class="chat-fab" onclick="openChat()">💬</div>

<div id="chatModal" class="chat-modal">
  <div class="chat-box">
    <div class="chat-header">
      <span>Eight Studios Chat</span>
      <button onclick="closeChat()">✕</button>
    </div>

    <iframe
      src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
      class="chat-frame">
    </iframe>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-buttons">

    <button class="icon-btn" onclick="window.location.href='tel:+15184770592'">📞</button>
    <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>
    <button class="icon-btn" onclick="window.location.href='download.html'">⬇️</button>

    <button class="insta-btn" onclick="window.open('https://instagram.com/eightstudios','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
    </button>

  </div>

  <div class="footer-text">© 2026 Eight Studios</div>
</div>

<script>

/* CHAT */
function openChat(){
  document.getElementById("chatModal").style.display = "flex";
}

function closeChat(){
  document.getElementById("chatModal").style.display = "none";
}

/* LOADER */
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1500);
});

/* ================= 7-DAY COUNTDOWN ================= */
const launchDate = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);

const countdown = setInterval(() => {
  const now = new Date().getTime();
  const distance = launchDate - now;

  if (distance <= 0) {
    document.getElementById("countdown").innerHTML = "WE ARE LIVE 🔥";
    clearInterval(countdown);
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s
     <small>Until launch</small>`;

}, 1000);

</script>

</body>
</html>
