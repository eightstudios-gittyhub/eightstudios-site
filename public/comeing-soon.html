<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<!-- ================= DISCORD / SOCIAL PREVIEW ================= -->
<meta property="og:title" content="Eight Studios - Coming Soon">
<meta property="og:description" content="Something new is on the way from Eight Studios. Stay tuned for the official launch.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Eight Studios - Coming Soon">
<meta name="twitter:description" content="Something new is on the way from Eight Studios. Stay tuned for the official launch.">
<meta name="twitter:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* ================= LOADING ================= */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align:center; }

.loader-logo {
  width: 85px;
  margin-bottom: 10px;
}

.loader-text { color:white; font-weight:bold; font-size:20px; }
.loader-sub { color:white; opacity:0.6; font-size:12px; margin-bottom:15px; }

.bar {
  width:200px;
  height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

.progress {
  width:0%;
  height:100%;
  background:#00c8ff;
  animation:load 2s forwards;
}

@keyframes load { to { width:100%; } }

/* ================= BASE ================= */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
  text-align: center;
}

.container {
  width: 100%;
  max-width: 600px;
  padding: 20px;
}

.logo {
  width: 110px;
  margin-bottom: 15px;
  max-width: 40vw;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

p {
  opacity: 0.7;
  font-size: 14px;
}

button {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* ================= CHAT ================= */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.chat-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 10000;
}

.chat-box {
  width: 100%;
  max-width: 420px;
  height: 75vh;
  background: #111;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
}

/* ================= FOOTER ================= */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  text-align: center;
}

.footer-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.icon-btn, .insta-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: 0.2s;
}

.icon-btn:hover, .insta-btn:hover {
  transform: scale(1.1);
}

.insta-btn img {
  width: 22px;
  height: 22px;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  h1 { font-size: 34px; }
  .chat-box { height: 80vh; }
}

@media (max-width: 480px) {
  h1 { font-size: 28px; }
  p { font-size: 12px; }
  button { width: 100%; max-width: 260px; }
  .chat-fab { width: 55px; height: 55px; font-size: 22px; }
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Coming Soon...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<div class="container">

  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">

  <h1>Coming Soon</h1>
  <p>Something new is on the way from Eight Studios.</p>

  <button onclick="window.location.href='https://eightstudios.org'">
    Return Home
  </button>

</div>

<!-- CHAT -->
<div class="chat-fab" onclick="openChat()">💬</div>

<div id="chatModal" class="chat-modal">
  <div class="chat-box">
    <iframe
      src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
      style="width:100%; height:100%; border:none;">
    </iframe>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-buttons">

    <button class="icon-btn" onclick="window.location.href='tel:+15184770592'">📞</button>
    <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>
    <button class="icon-btn" onclick="window.location.href='download.html'">⬇️</button>

    <button class="insta-btn" onclick="window.open('https://instagram.com/eightstudios','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
    </button>

  </div>

  <div class="footer-text">© 2026 Eight Studios</div>
</div>

<script>

/* LOADER */
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1500);
});

/* CHAT */
function openChat(){
  document.getElementById("chatModal").style.display = "flex";
}

</script>

</body>
</html>
