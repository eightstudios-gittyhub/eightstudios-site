<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beanies - Eight Studios</title>

<meta property="og:title" content="Beanies - Eight Studios">
<meta property="og:description" content="Shop custom handmade beanies from Eight Studios. Limited drops.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org/beanies.html">
<meta property="og:type" content="website">

<link rel="icon" type="image/png" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-logo {
  width: 80px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

.logo {
  width: 120px;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 30px;
}

/* CARD */
.card {
  width: 230px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.content { padding: 12px; }

.price { color: #00c8ff; font-weight: bold; }

.checkout-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px;
  background: rgba(0,200,255,0.2);
  color: white;
  text-decoration: none;
}

/* REVIEWS */
#reviewGrid {
  max-width: 900px;
  margin: auto;
}

.review-card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}

/* CHAT */
.chat-btn {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #00c8ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
}

.chat-popup {
  position: fixed;
  bottom: 90px;
  right: 18px;
  width: 320px;
  height: 450px;
  display: none;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html" style="color:white;">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <h1>Beanies</h1>
</div>

<!-- PRODUCTS -->
<div class="grid">

  <div class="card">
    <img src="https://i.imgur.com/vdjnkAZ.jpeg">
    <div class="content">
      <div>888 Long Beanie</div>
      <div class="price">$75</div>
      <a class="checkout-btn" href="#">Checkout</a>
    </div>
  </div>

</div>

<!-- REVIEWS -->
<div style="padding:30px;">
  <h2 style="text-align:center;">⭐ Reviews</h2>

  <div id="reviewGrid"></div>

  <div style="max-width:500px;margin:auto;">
    <form id="reviewForm">
      <input id="name" placeholder="Name" required style="width:100%;padding:10px;margin:5px 0;">
      
      <select id="rating" style="width:100%;padding:10px;margin:5px 0;">
        <option value="5">★★★★★</option>
        <option value="4">★★★★☆</option>
        <option value="3">★★★☆☆</option>
        <option value="2">★★☆☆☆</option>
        <option value="1">★☆☆☆☆</option>
      </select>

      <textarea id="text" placeholder="Review..." required style="width:100%;padding:10px;margin:5px 0;"></textarea>

      <button type="submit" style="width:100%;padding:10px;background:#00c8ff;border:none;">
        Submit
      </button>
    </form>
  </div>
</div>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatPopup" class="chat-popup">
  <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"></iframe>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEofs0dVhBEc1TiHUBwCOd2Eaj4qNdKo0",
  authDomain: "eightstudiosreviews.firebaseapp.com",
  projectId: "eightstudiosreviews",
  storageBucket: "eightstudiosreviews.firebasestorage.app",
  messagingSenderId: "564364405548",
  appId: "1:564364405548:web:d1353f1b68e9476fd75a89",
  measurementId: "G-HHD4HWDVKD"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

const reviewGrid = document.getElementById("reviewGrid");
const form = document.getElementById("reviewForm");

/* LOAD REVIEWS */
onSnapshot(collection(db, "reviews"), (snapshot) => {
  reviewGrid.innerHTML = "";

  snapshot.forEach((doc) => {
    const r = doc.data();

    reviewGrid.innerHTML += `
      <div class="review-card">
        <strong>${r.name}</strong><br>
        ${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}
        <p>"${r.text}"</p>
      </div>
    `;
  });

  if (snapshot.empty) {
    reviewGrid.innerHTML = "<p style='text-align:center;'>No reviews yet</p>";
  }
});

/* SUBMIT */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(collection(db, "reviews"), {
    name: name.value,
    rating: parseInt(rating.value),
    text: text.value,
    time: Date.now()
  });

  form.reset();
});
</script>

<script>
window.addEventListener("load", () => {
  setTimeout(() => document.getElementById("loadingScreen").remove(), 1500);
});

function toggleChat(){
  const chat = document.getElementById("chatPopup");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
