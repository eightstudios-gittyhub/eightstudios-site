<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hats - Eight Studios</title>

<meta property="og:title" content="Hats - Eight Studios">
<meta property="og:description" content="Explore custom hat drops from Eight Studios. More coming soon.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org/hats.html">

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* ================= LOADING ================= */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box { text-align:center; }

.loader-logo {
  width: 85px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text { color:white; font-weight:bold; font-size:20px; }
.loader-sub { color:white; opacity:0.6; font-size:12px; margin-bottom:15px; }

.bar {
  width:200px;
  height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
}

.progress {
  width:0%;
  height:100%;
  background:#00c8ff;
  animation:load 2s forwards;
}

@keyframes load { to { width:100%; } }
@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08); opacity:0.6;}
}

/* ================= PAGE ================= */
body {
  margin:0;
  font-family:Arial;
  color:white;
  background:radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

.nav {
  position:sticky;
  top:0;
  padding:15px;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav a { color:white; text-decoration:none; }

.header {
  text-align:center;
  padding:40px 20px;
}

.logo {
  width:120px;
  max-width:40%;
  margin-bottom:10px;
}

.empty {
  text-align:center;
  opacity:0.6;
}

/* ================= CHAT ================= */
.chat-fab {
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c8ff,#0077ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 🔴 badge */
#chatBadge {
  position:absolute;
  top:0;
  right:0;
  transform:translate(30%,-30%);
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  color:white;
  font-size:12px;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* 🟢 online dot */
#statusDot {
  position:absolute;
  bottom:6px;
  left:6px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff6a;
  border:2px solid black;
  box-shadow:0 0 8px rgba(0,255,106,0.8);
}

/* modal */
.chat-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:10000;
}

.chat-box {
  width:100%;
  max-width:420px;
  height:75vh;
  background:#111;
  border-radius:18px 18px 0 0;
  overflow:hidden;
}

.chat-header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1c1c1c;
}

.chat-header button {
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.chat-frame {
  width:100%;
  height:calc(100% - 48px);
  border:none;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Hats...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <h1>Hats</h1>
  <p>Custom hat drops will appear here.</p>
</div>

<div class="empty">More items coming soon.</div>

<!-- 💬 CHAT BUTTON (ONLY ONE) -->
<div class="chat-fab" onclick="openChat()">
  💬
  <span id="chatBadge">0</span>
  <span id="statusDot"></span>
</div>

<!-- 💬 CHAT POPUP -->
<div id="chatModal" class="chat-modal">
  <div class="chat-box">

    <div class="chat-header">
      <span>Eight Studios Chat</span>
      <button onclick="closeChat()">✕</button>
    </div>

    <iframe
      src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
      class="chat-frame">
    </iframe>

  </div>
</div>

<script>
let unread = 0;

/* OPEN */
function openChat(){
  document.getElementById("chatModal").style.display = "flex";
  resetBadge();
}

/* CLOSE */
function closeChat(){
  document.getElementById("chatModal").style.display = "none";
}

/* OUTSIDE CLOSE */
document.addEventListener("click",(e)=>{
  const modal = document.getElementById("chatModal");
  if(e.target === modal) closeChat();
});

/* 🔴 badge */
function addBadge(){
  unread++;
  const badge = document.getElementById("chatBadge");
  badge.style.display = "flex";
  badge.innerText = unread;
}

function resetBadge(){
  unread = 0;
  document.getElementById("chatBadge").style.display = "none";
}

/* 🟢 online */
window.addEventListener("load",()=>{
  document.getElementById("statusDot").style.background = "#00ff6a";
});
</script>

<!-- LOADING SCRIPT -->
<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1500);
});
</script>

</body>
</html>
