<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hats - Eight Studios</title>

<meta property="og:title" content="Hats - Eight Studios">
<meta property="og:description" content="Explore custom hat drops from Eight Studios. More coming soon.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">
<meta property="og:url" content="https://eightstudios.org/hats.html">

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* ================= LOADING SCREEN ================= */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
}

.loader-logo {
  width: 85px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 20px;
  font-weight: bold;
  color: white;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
  color: white;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: auto;
}

.progress {
  width: 0%;
  height: 100%;
  background: #00c8ff;
  animation: load 2s ease forwards;
}

@keyframes load { to { width: 100%; } }
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.6; }
}

/* ================= PAGE ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.logo {
  width: 120px;
  max-width: 40%;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 10px rgba(0,200,255,0.6));
}

.header {
  text-align: center;
  padding: 40px 20px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

.empty {
  text-align: center;
  margin-top: 40px;
  opacity: 0.6;
  font-size: 18px;
}

.note {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  opacity: 0.8;
}

.note a {
  color: #00c8ff;
  text-decoration: none;
}

/* ================= CHAT ================= */
.chat-fab{
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c8ff,#0077ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 🔴 badge */
#chatBadge{
  position:absolute;
  top:0;
  right:0;
  transform:translate(30%,-30%);
  background:red;
  color:white;
  font-size:12px;
  width:20px;
  height:20px;
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* 🟢 online dot */
#statusDot{
  position:absolute;
  bottom:6px;
  left:6px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff6a;
  border:2px solid black;
  box-shadow:0 0 8px rgba(0,255,106,0.8);
}

/* modal */
.chat-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:10000;
}

.chat-box{
  width:100%;
  max-width:420px;
  height:75vh;
  background:#111;
  border-radius:18px 18px 0 0;
  overflow:hidden;
}

.chat-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#1c1c1c;
}

.chat-header button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.chat-frame{
  width:100%;
  height:calc(100% - 48px);
  border:none;
}

</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Hats...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <h1>Hats</h1>
  <p>Custom hat drops will appear here.</p>
</div>

<div class="empty">More items coming soon.</div>

<div class="note">
Contact: <a href="mailto:eight888studios@gmail.com">eight888studios@gmail.com</a>
</div>

<!-- 💬 CHAT BUTTON -->
<div class="chat-fab" onclick="openChat()">
  💬
  <span id="chatBadge">0</span>
  <span id="statusDot"></span>
</div>

<!-- 💬 CHAT POPUP -->
<div id="chatModal" class="chat-modal">
  <div class="chat-box">

    <div class="chat-header">
      <span>Eight Studios Chat</span>
      <button onclick="closeChat()">✕</button>
    </div>

    <iframe
      src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
      class="chat-frame">
    </iframe>

  </div>
</div>

<!-- TAWK -->
<script src="https://embed.tawk.to/69febf581262751c34a07c2a/1jo5hmt37" async></script>

<script>
let unread = 0;

function openChat(){
  document.getElementById("chatModal").style.display = "flex";
  resetBadge();
}

function closeChat(){
  document.getElementById("chatModal").style.display = "none";
}

document.addEventListener("click",(e)=>{
  const modal = document.getElementById("chatModal");
  if(e.target === modal) closeChat();
});

/* 🔴 badge */
function addBadge(){
  unread++;
  const badge = document.getElementById("chatBadge");
  badge.style.display = "flex";
  badge.innerText = unread;
}

function resetBadge(){
  unread = 0;
  document.getElementById("chatBadge").style.display = "none";
}

/* 🟢 online */
function setOnline(){
  document.getElementById("statusDot").style.background = "#00ff6a";
}

/* Tawk events */
window.Tawk_API = window.Tawk_API || {};

window.Tawk_API.onChatMessageVisitor = function(){
  addBadge();
};

window.addEventListener("load",()=>{
  setOnline();
});
</script>

<!-- LOADING -->
<script>
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");
  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1500);
});
</script>

</body>
</html>
