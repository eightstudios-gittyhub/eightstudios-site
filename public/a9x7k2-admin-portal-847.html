<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, rgba(0,200,255,0.2), black);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PANEL */
.panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,200,255,0.3);
}

/* TITLE */
h1 {
  margin-bottom: 10px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  background: rgba(0,200,255,0.2);
  color: white;
  transition: 0.3s;
}

button:hover {
  background: rgba(0,200,255,0.5);
}

/* STATS */
.stats {
  margin: 15px 0;
  font-size: 14px;
  opacity: 0.8;
}

/* LOG */
.log {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
  height: 40px;
}

/* DENIED */
.denied {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-size: 20px;
  color: red;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
/* =========================
   🔐 PASSWORD PROTECTION
========================= */
const ADMIN_PASSWORD = "1234";

let input = prompt("Enter Admin Password:");
if (input !== ADMIN_PASSWORD) {
  document.body.innerHTML = "<div class='denied'>Access Denied</div>";
  throw new Error("Unauthorized");
}

/* =========================
   🖥️ BUILD PANEL UI
========================= */
document.getElementById("app").innerHTML = `
  <div class="panel">
    <h1>🛠 Admin Panel</h1>

    <div class="stats">
      Visitors: <span id="visits">0</span>
    </div>

    <button onclick="restartSite()">🔄 Restart Website</button>
    <button onclick="clearCache()">🧹 Clear Cache</button>
    <button onclick="forceReload()">⚡ Force Reload</button>
    <button onclick="goHome()">🏠 Go Home</button>
    <button onclick="sendTestWebhook()">📡 Test Webhook</button>

    <div class="log" id="log">Status: Ready</div>
  </div>
`;

/* =========================
   📊 VISITOR COUNTER
========================= */
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);
document.getElementById("visits").innerText = visits;

/* =========================
   🧠 LOG SYSTEM
========================= */
function log(msg) {
  document.getElementById("log").innerText = "Status: " + msg;
}

/* =========================
   🔄 RESTART SITE
========================= */
function restartSite() {
  log("Restarting...");

  setTimeout(() => {
    localStorage.clear();
    sessionStorage.clear();

    log("Cache cleared...");

    setTimeout(() => {
      location.href = "/";
    }, 1000);

  }, 500);
}

/* =========================
   🧹 CLEAR CACHE
========================= */
function clearCache() {
  localStorage.clear();
  sessionStorage.clear();
  log("Cache cleared");
}

/* =========================
   ⚡ FORCE RELOAD
========================= */
function forceReload() {
  log("Force reloading...");
  location.reload();
}

/* =========================
   🏠 GO HOME
========================= */
function goHome() {
  log("Redirecting...");
  location.href = "/";
}

/* =========================
   📡 DISCORD WEBHOOK
========================= */
const WEBHOOK_URL = "PASTE_YOUR_WEBHOOK_HERE";

function sendWebhook(message) {
  if (WEBHOOK_URL === "PASTE_YOUR_WEBHOOK_HERE") {
    log("No webhook set");
    return;
  }

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content: message
    })
  })
  .then(() => log("Webhook sent"))
  .catch(() => log("Webhook failed"));
}

function sendTestWebhook() {
  sendWebhook("🛠 Admin panel test from your site");
}
</script>

</body>
</html>
