<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Eight Studios Virtual Terminal</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<!-- SOCIAL PREVIEW -->
<meta name="description" content="Eight Studios Virtual Terminal — Admin-only cash payment system. Secure Square-powered payments.">

<meta property="og:title" content="Eight Studios Virtual Terminal">
<meta property="og:description" content="LIVE admin terminal for accepting cash payments. Secure, fast, and private.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="twitter:card" content="summary_large_image">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #012533, #00111a);
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 15px;
}

/* MAIN CARD */
.container {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 10px 40px rgba(0,255,255,0.15);
  position: relative;
  z-index: 2;
}

/* HEADER */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 12px;
}

.logo {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  margin-bottom: 8px;
}

h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 6px;
}

/* LIVE STATUS */
.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #7CFF8A;
  font-weight: 600;
}

.dot {
  width: 8px;
  height: 8px;
  background: #00ff66;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ff66;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

p {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 12px;
  text-align: center;
}

/* TERMINAL */
iframe {
  width: 100%;
  height: 460px;
  border: none;
  border-radius: 16px;
}

/* LOG */
.log {
  margin-top: 12px;
  max-height: 150px;
  overflow-y: auto;
  font-size: 12px;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 10px;
}

.entry {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.3s forwards;
  margin-bottom: 6px;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* WATERMARK */
.watermark {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  letter-spacing: 2px;
  color: white;
  opacity: 0.06;
  transform: rotate(-18deg);
  text-align: center;
  user-select: none;
}
</style>
</head>

<body>

<!-- 🔐 WATERMARK -->
<div class="watermark">
  EIGHT STUDIOS • SECURE TERMINAL • LOGGED SESSION
</div>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <img class="logo" src="https://eightstudios.org/IMG_7229-removebg-preview.png">

    <h1>Virtual Terminal</h1>

    <div class="status">
      <div class="dot"></div>
      LIVE TERMINAL ACTIVE
    </div>

  </div>

  <p>Admin Cash Payment Terminal — Secure Square Processing</p>

  <!-- TERMINAL -->
  <iframe src="https://app.squareup.com/terminal/checkout"></iframe>

  <!-- LOG -->
  <div class="log" id="log">
    Loading session logs...
  </div>

</div>

<script>
/* 🧾 LOCAL LOG DISPLAY */
function addLog(message) {
  const log = document.getElementById("log");

  const entry = document.createElement("div");
  entry.className = "entry";

  const time = new Date().toLocaleTimeString();
  entry.textContent = `${message} — ${time}`;

  log.prepend(entry);
}

/* 📡 REAL IP LOGGING (SERVER REQUIRED) */
fetch("/log-ip")
  .then(res => res.json())
  .then(data => {
    addLog("✔ IP Logged Successfully");
  })
  .catch(() => {
    addLog("⚠ IP Logging Failed (server offline)");
  });

/* INITIAL SYSTEM LOG */
addLog("System initialized");
</script>

</body>
</html>
