<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Eight Studios Virtual Terminal</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios Virtual Terminal — Admin-only cash payment system. Secure Square-powered payments.">

<meta property="og:title" content="Eight Studios Virtual Terminal">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #012533, #00111a);
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 15px;
}

/* MAIN CARD */
.container {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 10px 40px rgba(0,255,255,0.15);
}

/* HEADER */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 12px;
}

.logo {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  margin-bottom: 8px;
}

h1 {
  font-size: 18px;
  margin-bottom: 6px;
}

.status {
  font-size: 12px;
  color: #7CFF8A;
}

/* TERMINAL */
iframe {
  width: 100%;
  height: 460px;
  border: none;
  border-radius: 16px;
}

/* LOG */
.log {
  margin-top: 12px;
  font-size: 12px;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 10px;
}

/* 🧾 FOOTER STATUS */
.footer {
  margin-top: 12px;
  font-size: 11px;
  text-align: center;
  opacity: 0.75;
  line-height: 1.6;
  padding: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.down {
  color: #ff4d4d;
  font-weight: bold;
}

.online {
  color: #7CFF8A;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img class="logo" src="https://eightstudios.org/IMG_7229-removebg-preview.png">
    <h1>Virtual Terminal</h1>
    <div class="status">LIVE TERMINAL ACTIVE</div>
  </div>

  <p style="text-align:center; opacity:0.7; font-size:12px;">
    Admin Cash Payment Terminal — Secure Square Processing
  </p>

  <!-- TERMINAL -->
  <iframe src="https://app.squareup.com/terminal/checkout"></iframe>

  <!-- LOG -->
  <div class="log" id="log">
    System initialized...
  </div>

  <!-- 🔐 API STATUS FOOTER -->
  <div class="footer">
    ⚠️ <span class="down">IP Logging API is currently DOWN</span><br>
    🟢 Transaction API: <span class="online">ONLINE</span><br>
    🟢 Terminal Service: <span class="online">ONLINE</span><br>
    🟢 Authentication Service: <span class="online">ONLINE</span>
  </div>

</div>

<script>
function addLog(msg) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.textContent = msg + " — " + new Date().toLocaleTimeString();
  log.prepend(div);
}

/* Attempt IP log */
fetch("/log-ip")
  .then(() => addLog("✔ IP log attempted"))
  .catch(() => addLog("⚠ IP logging unavailable"));
</script>

</body>
</html>
