<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Eight Studios Virtual Terminal</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #012533, #00111a);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MAIN APP */
.container {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,255,255,0.15);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  margin-bottom: 8px;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 4px;
}

/* TERMINAL */
iframe {
  width: 100%;
  height: 420px;
  border: none;
  border-radius: 14px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- MAIN APP -->
<div class="container">

  <div class="header">
    <img class="logo" src="https://eightstudios.org/IMG_7229-removebg-preview.png">
    <div class="title">Virtual Terminal</div>
    <div class="subtitle">Secure Admin Processing System</div>
  </div>

  <iframe src="https://app.squareup.com/terminal/checkout"></iframe>

</div>

</body>
</html>
