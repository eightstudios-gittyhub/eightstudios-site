<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodies - Eight Studios</title>
<link rel="icon" type="image/gif" href="/the-world-is-yours-ship.gif">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* NAV (ONLY HOME) */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
}

.header p {
  opacity: 0.7;
}

/* GRID */
.grid {
  display: flex;
  justify-content: center;
  padding: 40px;
}

/* LINK RESET */
.card-link {
  text-decoration: none;
  color: inherit;
}

/* PRODUCT CARD */
.card {
  width: 260px;
  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(15px);
  overflow: hidden;

  transition: 0.25s;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.4);
}

/* TEXT */
.content {
  padding: 12px;
}

.title {
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 5px;
}

.checkout-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
  color: white;
  font-size: 13px;
  font-weight: bold;
  text-decoration: none;
}

.checkout-btn:hover {
  background: rgba(0,200,255,0.35);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Hoodies</h1>
  <p>Handmade 1/1 hooded garments by Eight Studios.</p>
</div>

<!-- PRODUCT -->
<div class="grid">

  <div class="card" onclick="window.open('https://buy.stripe.com/28EfZj4AL90K87V70C5Rm0d', '_blank')">
    <img src="https://i.imgur.com/pIeNzKp.jpeg">
    <div class="content">
      <div class="title">888 Heavyweight Zipup — 1/1</div>
      <div class="subtitle">Handmade zip-up hoodie</div>
      <a href="https://buy.stripe.com/28EfZj4AL90K87V70C5Rm0d" target="_blank" class="checkout-btn" onclick="event.stopPropagation()">Checkout</a>
    </div>
  </div>

</div>

</body>
</html>
