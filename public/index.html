<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: flex-end;
  padding: 14px 20px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 13px;
  cursor: pointer;
}

.hero {
  position: relative;
  z-index: 1;
  padding: 80px 20px 40px;
  text-align: center;
}

.logo {
  width: 90px;
  margin-bottom: 20px;
}

.title {
  font-size: 34px;
  font-weight: 600;
}

.subtitle {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.7;
}

.actions {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn {
  width: 90%;
  max-width: 320px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  text-decoration: none;
  text-align: center;
  font-size: 14px;
}

.grid {
  position: relative;
  z-index: 1;
  margin-top: 50px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  padding: 0 20px 60px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.25s;
  backdrop-filter: blur(20px);
}

.card:hover {
  transform: scale(1.03);
  background: rgba(255,255,255,0.12);
}

.card a {
  color: white;
  text-decoration: none;
}

.footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  padding: 20px;
  position: relative;
  z-index: 1;
}
</style>

<script>
function shareSite() {
  const data = {
    title: document.title,
    text: "Check out Eight Studios 🔥",
    url: window.location.href
  };

  if (navigator.share) {
    navigator.share(data);
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied!");
  }
}
</script>
