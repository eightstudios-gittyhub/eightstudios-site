<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  padding: 14px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.nav-share:hover {
  transform: scale(1.05);
  border: 1px solid rgba(0,200,255,0.5);
  background: rgba(0,200,255,0.15);
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 18px;
}

.title {
  font-size: clamp(24px, 5vw, 34px);
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

.actions {
  margin-top: 35px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn {
  width: 92%;
  max-width: 340px;
  padding: 15px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: 0.2s;
  font-size: 15px;
}

.btn:hover {
  transform: translateY(-2px);
  background: rgba(0,200,255,0.2);
}

/* GRID */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(0,200,255,0.18);
  border: 1px solid rgba(0,200,255,0.4);
}

.card a {
  color: white;
  text-decoration: none;
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s ease;
}

.loader-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 22px;
  font-weight: 600;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
  margin-bottom: 18px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: rgba(0,200,255,0.8);
  animation: load 2.2s ease forwards;
}

@keyframes load { to { width: 100%; } }
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* CHAT ICON */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: 0.2s;
}

.chat-fab:hover {
  transform: scale(1.08);
}

/* 🖥️ DESKTOP CHAT WINDOW */
.chat-modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
}

.chat-window {
  width: 420px;
  height: 600px;
  background: rgba(25,25,25,0.95);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* TOP BAR LIKE DESKTOP WINDOW */
.chat-topbar {
  height: 42px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  font-size: 13px;
}

.chat-title {
  opacity: 0.9;
}

.chat-close {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.chat-close:hover {
  background: rgba(255,0,0,0.4);
}

/* CHAT FRAME */
.chat-frame {
  flex: 1;
  width: 100%;
  border: none;
}

/* FOOTER */
.footer {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px);
}

.footer-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* INSTAGRAM */
.insta-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.insta-btn svg {
  width: 24px;
  height: 24px;
  fill: white;
  opacity: 0.85;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Eight Studios…</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-share" onclick="shareSite()">Share</button>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
  <div class="card"><a href="hats.html">Hats</a></div>
  <div class="card"><a href="phone-cases.html">Phone Cases</a></div>
</div>

<!-- CHAT BUTTON -->
<div class="chat-fab" onclick="openChat()">💬</div>

<!-- DESKTOP CHAT WINDOW -->
<div id="chatModal" class="chat-modal">
  <div class="chat-window">
    
    <div class="chat-topbar">
      <div class="chat-title">Eight Studios Chat</div>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>

    <iframe class="chat-frame"
      src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37">
    </iframe>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">

    <button class="insta-btn" onclick="openInstagram()">
      <svg viewBox="0 0 24 24">
        <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
        <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
      </svg>
    </button>

    <div class="footer-text">© 2026 Eight Studios. All rights reserved.</div>
  </div>
</div>

<script>
function openChat(){
  document.getElementById("chatModal").style.display="flex";
}

function closeChat(){
  document.getElementById("chatModal").style.display="none";
}

function shareSite(){
  navigator.share?.({
    title:"Eight Studios",
    text:"Check out Eight Studios 🔥",
    url:"https://eightstudios.org/?ref=888Studios"
  });
}

function openInstagram(){
  window.location.href="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";
}

window.addEventListener("load",()=>{
  setTimeout(()=>{
    const l=document.getElementById("loadingScreen");
    l.style.opacity="0";
    setTimeout(()=>l.remove(),600);
  },2000);
});
</script>

</body>
</html>
