<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<!-- PWA -->
<link rel="manifest" href="https://progressier.app/3pu6Vi4Vxb4iVmqgUNwC/progressier.json"/>
<script defer src="https://progressier.app/3pu6Vi4Vxb4iVmqgUNwC/script.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
}

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 20px;
  font-weight: bold;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: #00c8ff;
  animation: load 2s forwards;
}

@keyframes load {
  to { width: 100%; }
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 18px;
}

.title {
  font-size: clamp(24px, 5vw, 34px);
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

/* GRID */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  background: rgba(0,200,255,0.18);
}

.card a {
  color: white;
  text-decoration: none;
}

/* FOOTER */
.footer {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px);
}

.footer-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.footer-buttons {
  display: flex;
  gap: 12px;
  align-items: center;
}

.icon-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
}

.insta-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.insta-btn svg {
  width: 24px;
  height: 24px;
  fill: white;
  opacity: 0.85;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}

/* ================= CHAT WIDGET ================= */
.chat-btn {
  position: fixed;
  bottom: 18px;
  left: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.chat-popup {
  position: fixed;
  bottom: 90px;
  left: 18px;
  width: 320px;
  height: 450px;
  border-radius: 14px;
  overflow: hidden;
  display: none;
  z-index: 9999;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.chat-popup iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Eight Studios...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
  <div class="card"><a href="hats.html">Hats</a></div>
  <div class="card"><a href="comeing-soon.html">Phone Cases</a></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">

    <div class="footer-buttons">

      <button class="icon-btn" onclick="window.location.href='tel:+15184770592'">📞</button>

      <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>

      <button class="insta-btn" onclick="openInstagram()">
        <svg viewBox="0 0 24 24">
          <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
          <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </button>

    </div>

    <div class="footer-text">© 2026 Eight Studios</div>
  </div>
</div>
  
<script>
function openInstagram(){
  window.location.href="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";
}


/* CHAT TOGGLE */
function toggleChat(){
  const chat = document.getElementById("chatPopup");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}

/* LOADING */
window.addEventListener("load", () => {
  const loader = document.getElementById("loadingScreen");

  setTimeout(() => {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 600);
  }, 1800);
});
</script>

</body>
</html>
