<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  padding: 14px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.nav-share:hover {
  transform: scale(1.05);
  border: 1px solid rgba(0,200,255,0.5);
  background: rgba(0,200,255,0.15);
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 18px;
}

.title {
  font-size: clamp(24px, 5vw, 34px);
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(0,200,255,0.18);
  border: 1px solid rgba(0,200,255,0.4);
}

.card a {
  color: white;
  text-decoration: none;
}

/* CHAT */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  cursor: pointer;
}

/* FOOTER */
.footer {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px);
}

.footer-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* BUTTON ROW (UPDATED) */
.footer-buttons {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ICON BUTTONS */
.icon-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-btn svg {
  width: 24px;
  height: 24px;
  fill: white;
  opacity: 0.85;
}

.footer-text {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button class="nav-share" onclick="shareSite()">Share</button>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
  <div class="card"><a href="hats.html">Hats</a></div>
  <div class="card"><a href="phone-cases.html">Phone Cases</a></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">

    <div class="footer-buttons">

      <!-- CALL BUTTON (NEW) -->
      <button class="icon-btn" onclick="window.location.href='tel:+10000000000'">
        📞
      </button>

      <!-- INSTAGRAM -->
      <button class="icon-btn" onclick="openInstagram()">
        <svg viewBox="0 0 24 24">
          <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
          <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
        </svg>
      </button>

    </div>

    <div class="footer-text">© 2026 Eight Studios. All rights reserved.</div>
  </div>
</div>

<script>
function openInstagram(){
  window.location.href="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";
}

function shareSite(){
  navigator.share?.({
    title:"Eight Studios",
    text:"Check out Eight Studios 🔥",
    url:"https://eightstudios.org/?ref=888Studios"
  });
}
</script>

</body>
</html>
