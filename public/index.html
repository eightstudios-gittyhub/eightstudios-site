<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, Arial;
}

body {
  color:white;
  background:url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size:cover;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
}

/* SEARCH */
.search-wrap {
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  margin-top:18px;
}

.search {
  width:92%;
  max-width:520px;
  padding:14px;
  border-radius:14px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(16px);
  color:white;
  outline:none;
}

/* HERO */
.hero {
  position:relative;
  z-index:2;
  text-align:center;
  padding:40px 20px;
}

.hero img {
  width:90px;
  margin-bottom:12px;
}

.title {
  font-size:28px;
}

/* RESULTS */
.results {
  position:relative;
  z-index:2;
  padding:20px;
  display:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;
}

.card {
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="search-wrap">
  <input class="search" id="search" placeholder="Search: black hoodie oversized..." oninput="smartSearch()">
</div>

<div class="hero" id="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
  <div class="title">Eight Studios Search</div>
</div>

<div class="results" id="results">
  <div class="grid" id="grid"></div>
</div>

<script>

/* PRODUCT DATABASE (AI TAGGED) */
const products = [
  {name:"Black Oversized Hoodie", tags:["hoodie","black","oversized","streetwear","winter"]},
  {name:"White Hoodie", tags:["hoodie","white","clean","minimal"]},
  {name:"Baggy Shorts", tags:["shorts","baggy","summer","loose"]},
  {name:"Summer Shorts Light", tags:["shorts","summer","light","breathable"]},
  {name:"Black Beanie", tags:["beanie","black","winter","clean"]},
  {name:"Minimal Beanie", tags:["beanie","minimal","clean"]},
  {name:"Street Pants", tags:["pants","baggy","streetwear","oversized"]}
];

/* SIMPLE AI PARSER */
function parseQuery(q){
  const text = q.toLowerCase();

  return {
    raw: text,
    tokens: text.split(/\s+/),
    has: (word)=>text.includes(word)
  };
}

/* AI SCORING ENGINE */
function score(product, query){
  let score = 0;
  const q = parseQuery(query);

  product.tags.forEach(tag=>{
    if(q.has(tag)) score += 40;
  });

  q.tokens.forEach(t=>{
    if(product.name.toLowerCase().includes(t)) score += 20;
    if(product.tags.includes(t)) score += 25;
  });

  /* STYLE BOOST RULES */
  if(q.has("black") && product.tags.includes("black")) score += 30;
  if(q.has("white") && product.tags.includes("white")) score += 30;
  if(q.has("oversized") && product.tags.includes("oversized")) score += 35;
  if(q.has("baggy") && product.tags.includes("baggy")) score += 35;
  if(q.has("summer") && product.tags.includes("summer")) score += 30;

  return score;
}

/* SMART SEARCH */
function smartSearch(){
  const query = document.getElementById("search").value;
  const grid = document.getElementById("grid");

  if(!query){
    document.getElementById("results").style.display="none";
    document.getElementById("hero").style.display="block";
    return;
  }

  const results = products
    .map(p => ({...p, score:score(p,query)}))
    .filter(p => p.score > 0)
    .sort((a,b)=>b.score-a.score);

  grid.innerHTML = results.map(r => `
    <div class="card">
      ${r.name}
    </div>
  `).join("");

  document.getElementById("hero").style.display="none";
  document.getElementById("results").style.display="block";
}

</script>

</body>
</html>
