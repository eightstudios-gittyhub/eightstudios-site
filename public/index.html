<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

.nav, .hero { position: relative; z-index: 1; }

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 12px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  opacity: 0.85;
  font-size: 14px;
}

/* HERO */
.hero {
  min-height: 100vh;
  padding: 20px 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-align: center;
}

/* TITLE */
.title {
  font-size: clamp(28px, 8vw, 55px);
  font-weight: bold;
  letter-spacing: 2px;
}

/* BUTTONS */
.phone-btn, .sms-btn, .download-btn, .iphone-btn {
  width: 100%;
  max-width: 320px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: all 0.25s ease;
  cursor: pointer;
  display: block;
}

.phone-btn:active,
.sms-btn:active,
.download-btn:active,
.iphone-btn:active {
  transform: scale(0.97);
}

.phone-btn:hover,
.sms-btn:hover,
.download-btn:hover,
.iphone-btn:hover {
  transform: translateY(-2px);
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 420px;
  margin-top: 15px;
}

/* CARDS */
.card {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(14px);
  font-weight: bold;
  font-size: 14px;
}

.card a {
  color: white;
  text-decoration: none;
}

/* FOOTER */
.note {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  opacity: 0.8;
}

.note a {
  color: #00c8ff;
  text-decoration: none;
}

/* SMALL DEVICES */
@media (max-width: 400px) {
  .card { height: 80px; font-size: 12px; }
  .nav { padding: 10px; }
}
