<script>
function shareSite() {
  const data = {
    title: document.title,
    text: "Check out Eight Studios 🔥",
    url: window.location.href
  };

  if (navigator.share) {
    navigator.share(data);
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied!");
  }
}

function showIOSDownload() {

  <!-- CHAT BUTTON -->
<button id="chatBtn" onclick="toggleChat()">💬</button>

<!-- CHAT BOX -->
<div id="chatBox">
  <div id="chatHeader">AI Chat</div>

  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Message..." />
    <button id="send" onclick="sendMessage()">➤</button>
  </div>
</div>
  <script>
function toggleChat() {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
  box.style.flexDirection = "column";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 9999;
}

function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    addMessage(getResponse(text), "bot");
  }, 500);
}

/* 🤖 SIMPLE AI RESPONSES */
function getResponse(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("hello")) return "Hey 👋";
  if (msg.includes("help")) return "I can help you explore the site";
  if (msg.includes("price")) return "Prices are on each product page 🔥";
  if (msg.includes("shop")) return "Check out hoodies, hats, and more 🛒";

  return "I’m still learning 🧠";
}
