<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  padding: 14px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 18px;
}

.title {
  font-size: 32px;
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

/* GRID */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card a {
  color: white;
  text-decoration: none;
}

/* CHAT BUTTON */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  z-index: 9999;
  cursor: pointer;
}

/* CHAT WINDOW */
.chat-modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
}

.chat-window {
  width: 420px;
  height: 600px;
  background: rgba(25,25,25,0.95);
  backdrop-filter: blur(25px);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.chat-topbar {
  height: 42px;
  background: rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
}

.chat-close {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

.chat-frame {
  flex: 1;
  border: none;
}

/* 🔥 NEW FOOTER DOCK */
.footer {
  position: relative;
  z-index: 2;
  margin-top: 40px;
  padding: 25px 10px;
  text-align: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(20px);
}

.footer-dock {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

/* ICON BUTTONS */
.dock-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.25s;
}

.dock-btn svg {
  width: 22px;
  height: 22px;
  fill: white;
  opacity: 0.85;
}

.dock-btn:hover {
  transform: translateY(-3px) scale(1.08);
  border: 1px solid rgba(0,200,255,0.5);
  background: rgba(0,200,255,0.12);
}

/* COPYRIGHT */
.copyright {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
</div>

<!-- CHAT -->
<div class="chat-fab" onclick="openChat()">💬</div>

<div id="chatModal" class="chat-modal">
  <div class="chat-window">
    <div class="chat-topbar">
      <span>Chat</span>
      <button class="chat-close" onclick="closeChat()">✕</button>
    </div>
    <iframe class="chat-frame" src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"></iframe>
  </div>
</div>

<!-- FOOTER (ALL BUTTONS COMBINED) -->
<div class="footer">

  <div class="footer-dock">

    <!-- CALL -->
    <a class="dock-btn" href="tel:5184770592">
      📞
    </a>

    <!-- TEXT -->
    <a class="dock-btn" href="sms:5184770592">
      💬
    </a>

    <!-- INSTAGRAM -->
    <div class="dock-btn" onclick="openInstagram()">
      <svg viewBox="0 0 24 24">
        <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2zm0 2A3.76 3.76 0 0 0 4 7.75v8.5A3.76 3.76 0 0 0 7.75 20h8.5A3.76 3.76 0 0 0 20 16.25v-8.5A3.76 3.76 0 0 0 16.25 4h-8.5z"/>
        <path d="M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
      </svg>
    </div>

  </div>

  <div class="copyright">© 2026 Eight Studios. All rights reserved.</div>
</div>

<script>
function openChat(){
  document.getElementById("chatModal").style.display="flex";
}

function closeChat(){
  document.getElementById("chatModal").style.display="none";
}

function openInstagram(){
  window.location.href="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";
}
</script>

</body>
</html>
