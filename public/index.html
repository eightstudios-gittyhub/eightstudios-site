<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: flex-end;
  padding: 14px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 70px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 20px;
}

.title {
  font-size: 34px;
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

.actions {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn {
  width: 90%;
  max-width: 320px;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
  background: rgba(0,200,255,0.2);
}

/* GRID */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card a {
  color: white;
  text-decoration: none;
}

/* CHAT */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #00c8ff;
  border: none;
  font-size: 22px;
  cursor: pointer;
  z-index: 999;
}

#chatBox {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: rgba(20,20,20,0.95);
  border-radius: 16px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
}

#chatHeader {
  padding: 10px;
  text-align: center;
  background: rgba(255,255,255,0.1);
}

#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 6px 0;
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;
  max-width: 80%;
}

.user {
  background: #00c8ff;
  color: black;
  margin-left: auto;
}

.bot {
  background: rgba(255,255,255,0.1);
}

#inputArea {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.1);
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: white;
  outline: none;
}

#send {
  padding: 10px;
  background: #00c8ff;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button class="nav-share" onclick="shareSite()">Share</button>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>

  <div class="actions">
    <a class="btn" href="tel:5184770592">Call</a>
    <a class="btn" href="sms:5184770592">Text</a>
    <a class="btn" href="https://eightstudios.org/app-release%20(1).apk">Download Android</a>
    <button class="btn" onclick="ios()">Download iPhone</button>
  </div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
  <div class="card"><a href="hats.html">Hats</a></div>
</div>

<!-- CHAT -->
<button id="chatBtn" onclick="toggleChat()">💬</button>

<div id="chatBox">
  <div id="chatHeader">Eight Studios AI</div>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="input" placeholder="Ask about products..." />
    <button id="send" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
function toggleChat() {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
  box.style.flexDirection = "column";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 99999;
}

/* 🧠 REAL CHATGPT AI */
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Thinking...", "bot");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  document.querySelectorAll(".bot:last-child")[0].innerText = data.reply;
}

/* SHARE */
function shareSite() {
  navigator.share?.({
    title: "Eight Studios",
    text: "Check this out 🔥",
    url: window.location.href
  }) || alert("Copy link");
}

/* iOS */
function ios() {
  alert("Safari → Share → Add to Home Screen 📱");
}
</script>

</body>
</html>
