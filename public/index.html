<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta name="description" content="Eight Studios — premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:title" content="Eight Studios">
<meta property="og:description" content="Premium streetwear essentials. Shop hoodies, beanies, shorts & more.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
}

body {
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: flex-end;
  padding: 14px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.nav-share {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
  font-size: 14px;
}

/* HERO */
.hero {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  width: 90px;
  margin-bottom: 18px;
}

.title {
  font-size: clamp(24px, 5vw, 34px);
  font-weight: 600;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 6px;
}

.actions {
  margin-top: 35px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn {
  width: 92%;
  max-width: 340px;
  padding: 15px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: 0.2s;
  font-size: 15px;
}

.btn:hover {
  transform: translateY(-2px);
  background: rgba(0,200,255,0.2);
}

/* GRID */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 20px;
}

.card {
  height: 120px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
}

.card a {
  color: white;
  text-decoration: none;
}

/* LOADING */
.loading-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s ease;
}

.loader-box {
  text-align: center;
  color: white;
}

.loader-logo {
  width: 80px;
  margin-bottom: 10px;
  animation: pulse 1.5s infinite;
}

.loader-text {
  font-size: 22px;
  font-weight: 600;
}

.loader-sub {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
  margin-bottom: 18px;
}

.bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  margin: auto;
}

.progress {
  width: 0%;
  height: 100%;
  background: rgba(0,200,255,0.8);
  animation: load 2.2s ease forwards;
}

@keyframes load { to { width: 100%; } }
@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.7; }
}

/* CHAT BUTTON */
.chat-fab{
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#00c8ff,#0077ff);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:pulse 1.8s infinite;
}

/* CHAT MODAL */
.chat-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:10000;
}

.chat-box{
  width:100%;
  max-width:420px;
  height:75vh;
  background:#111;
  border-radius:18px 18px 0 0;
  overflow:hidden;
  animation:slideUp 0.35s forwards;
}

/* 📱 FULL SCREEN ON MOBILE */
@media (max-width: 600px){
  .chat-box{
    height:100vh;
    border-radius:0;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .btn {
    font-size: 16px;
    padding: 16px;
  }

  .nav {
    justify-content: center;
  }
}

.chat-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px;
  background:#1c1c1c;
  color:white;
  font-weight:600;
}

.chat-header button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.chat-frame{
  width:100%;
  height:calc(100% - 48px);
  border:none;
}

@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="loader-logo">
    <div class="loader-text">Eight Studios</div>
    <div class="loader-sub">Loading Eight Studios ...</div>
    <div class="bar"><div class="progress"></div></div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-share" onclick="shareSite()">Share</button>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">
  <div class="title">Eight Studios</div>
  <div class="subtitle">Premium streetwear essentials</div>

  <div class="actions">
    <a class="btn" href="tel:5184770592">Call</a>
    <a class="btn" href="sms:5184770592">Text</a>
    <button class="btn" onclick="openInstagram()">Instagram</button>
    <a class="btn" href="https://eightstudios.org/app-release%20(1).apk">Download Android</a>
    <button class="btn" onclick="iosInstall()">Download iPhone</button>
  </div>
</div>

<!-- GRID -->
<div class="grid">
  <div class="card"><a href="beanies.html">Beanies</a></div>
  <div class="card"><a href="hoodies.html">Hoodies</a></div>
  <div class="card"><a href="shorts.html">Shorts</a></div>
  <div class="card"><a href="pants.html">Pants</a></div>
  <div class="card"><a href="hats.html">Hats</a></div>
</div>

<!-- CHAT -->
<div class="chat-fab" onclick="openChat()">💬</div>

<div id="chatModal" class="chat-modal">
  <div class="chat-box">
    <div class="chat-header">
      <span>Eight Studios Chat</span>
      <button onclick="closeChat()">✕</button>
    </div>
    <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37" class="chat-frame"></iframe>
  </div>
</div>

<script>
function shareSite(){
  navigator.share?.({
    title:"Eight Studios",
    text:"Check this out 🔥",
    url:window.location.href
  }) || navigator.clipboard.writeText(window.location.href);
}

function iosInstall(){
  alert("Open Safari → Share → Add to Home Screen");
}

function openInstagram(){
  const appUrl="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";
  const webUrl="https://www.instagram.com/eight888studios?igsh=anB0c2R3dmsxbnc3&utm_source=qr";

  window.location.href=appUrl;

  setTimeout(()=>{
    if(!document.hidden) window.location.href=webUrl;
  },900);
}

function openChat(){
  document.getElementById("chatModal").style.display="flex";
}

function closeChat(){
  document.getElementById("chatModal").style.display="none";
}

document.addEventListener("click", (e)=>{
  if(e.target.id==="chatModal") closeChat();
});

window.addEventListener("load", ()=>{
  const loader=document.getElementById("loadingScreen");
  setTimeout(()=>{
    loader.style.opacity="0";
    setTimeout(()=>loader.remove(),600);
  },2000);
});
</script>

</body>
</html>
