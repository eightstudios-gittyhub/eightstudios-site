<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Checkout</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#00111a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
  text-align:center;
}

h1 {
  margin-bottom:10px;
}

iframe {
  width:100%;
  height:500px;
  border:none;
  border-radius:15px;
}

button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Checkout</h1>
  <p>Secure payment powered by Square</p>

  <iframe src="https://app.squareup.com/terminal/checkout"></iframe>

  <button onclick="window.location.href='success.html'">
    I Completed Payment
  </button>
</div>

</body>
</html>
