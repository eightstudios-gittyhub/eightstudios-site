<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eight Studios Checkout</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #00111a;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Glass container */
.container {
  width: 95%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(0,255,255,0.15);
  text-align: center;
}

/* Title */
h1 {
  margin-bottom: 5px;
  font-weight: 600;
}

/* Subtitle */
p {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 15px;
}

/* Checkout frame */
iframe {
  width: 100%;
  height: 520px;
  border: none;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Checkout</h1>
  <p>Secure payment powered by Square Virtual Terminal</p>

  <iframe src="https://app.squareup.com/terminal/checkout"></iframe>
</div>

</body>
</html>
