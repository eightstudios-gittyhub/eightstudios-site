<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://eightstudios.org/the-world-is-yours-ship.gif') center/cover no-repeat;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.container {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 250px);
  gap: 15px;
}

a.btn {
  text-decoration: none;
  color: white;
  padding: 15px;
  text-align: center;
  border-radius: 15px;
  background: rgba(20,20,20,0.6);
  border: 1px solid rgba(255,255,255,0.2);
}

a.btn:hover {
  box-shadow: 0 0 20px #7a5cff;
}

.wide {
  grid-column: span 2;
}
</style>
</head>

<body>

<div class="container">
  <div class="grid">

    <a href="/products/beanies/" class="btn">Beanies</a>
    <a href="/products/phone-cases/" class="btn">Phone Cases</a>

    <a href="/products/hoodies/" class="btn">Hoodies</a>
    <a href="/products/jeans/" class="btn">Jeans</a>

    <a href="/products/shorts/" class="btn">Shorts</a>
    <a href="/products/pants/" class="btn">Pants</a>

    <a href="/products/hats/" class="btn wide">Hats</a>

  </div>
</div>

</body>
</html>
