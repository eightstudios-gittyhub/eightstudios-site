<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at center, rgba(0,200,255,0.25), black 70%);
  background-attachment: fixed;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  display: flex;
  gap: 25px;
  padding: 15px;
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

.title {
  font-size: 40px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

/* 🔥 COOL BUTTONS */
.card {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  font-weight: bold;
  letter-spacing: 1px;

  cursor: pointer;
  position: relative;
  overflow: hidden;

  background: radial-gradient(circle at 30% 30%, rgba(0,255,255,0.25), rgba(0,0,0,0.9));
  border: 1px solid rgba(0,255,255,0.3);

  transition: all 0.3s ease;
}

/* spinning glow ring */
.card::before {
  content: "";
  position: absolute;
  width: 160%;
  height: 160%;
  background: conic-gradient(
    from 0deg,
    transparent,
    rgba(0,255,255,0.6),
    transparent,
    rgba(255,0,150,0.6),
    transparent
  );
  animation: spin 4s linear infinite;
}

/* inner circle */
.card::after {
  content: "";
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  background: black;
  z-index: 1;
}

/* text on top */
.card span {
  position: relative;
  z-index: 2;
}

/* hover glow */
.card:hover {
  transform: scale(1.15) rotate(3deg);
  box-shadow: 0 0 30px rgba(0,255,255,0.6),
              0 0 60px rgba(255,0,150,0.4);
}

/* animation */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* PRODUCTS */
.products {
  padding: 50px 20px;
  display: none;
}

.product {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: white;
  color: black;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#">Home</a>
  <a href="#" onclick="showProducts()">Products</a>
  <a href="#">Contact</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="title">EIGHT STUDIOS</div>

  <div class="grid">
    <div class="card" onclick="filter('Beanies')"><span>Beanies</span></div>
    <div class="card" onclick="filter('Hoodies')"><span>Hoodies</span></div>
    <div class="card" onclick="filter('Jeans')"><span>Jeans</span></div>
    <div class="card" onclick="filter('Shorts')"><span>Shorts</span></div>
    <div class="card" onclick="filter('Pants')"><span>Pants</span></div>
    <div class="card" onclick="filter('Hats')"><span>Hats</span></div>
  </div>

  <div class="btn" onclick="showProducts()">View Products</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
  <h2>Products</h2>

  <div class="product" data-type="Shorts">🔥 Shorts Product</div>
  <div class="product" data-type="Hoodies">🔥 Hoodie Product</div>
  <div class="product" data-type="Beanies">🔥 Beanie Product</div>
  <div class="product" data-type="Jeans">🔥 Jeans Product</div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Eight Studios
</footer>

<script>
function showProducts() {
  document.getElementById("products").style.display = "block";
  window.scrollTo({
    top: document.getElementById("products").offsetTop,
    behavior: "smooth"
  });
}

function filter(type) {
  showProducts();

  let items = document.querySelectorAll(".product");

  items.forEach(item => {
    if (item.dataset.type === type) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
}
</script>

</body>
</html>
