<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at center, rgba(0,200,255,0.25), black 70%);
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  gap: 20px;
  padding: 15px;
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.title {
  font-size: 40px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* 📦 BOX BUTTONS */
.card {
  width: 150px;
  height: 100px;
  border-radius: 12px; /* slight rounding */

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255,255,255,0.1);
  font-weight: bold;
  cursor: pointer;

  transition: 0.2s;
}

/* HOVER */
.card:hover {
  background: rgba(0,200,255,0.3);
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,200,255,0.4);
}

/* PRODUCTS */
.products {
  display: none;
  padding: 40px;
}

.product {
  margin: 10px;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: white;
  color: black;
  border-radius: 30px;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="nav">
  <a href="#">Home</a>
  <a href="#" onclick="showProducts()">Products</a>
</div>

<div class="hero">
  <div class="title">EIGHT STUDIOS</div>

  <div class="grid">
    <div class="card" onclick="filter('Beanies')">Beanies</div>
    <div class="card" onclick="filter('Hoodies')">Hoodies</div>
    <div class="card" onclick="filter('Jeans')">Jeans</div>
    <div class="card" onclick="filter('Shorts')">Shorts</div>
    <div class="card" onclick="filter('Pants')">Pants</div>
    <div class="card" onclick="filter('Hats')">Hats</div>
  </div>

  <div class="btn" onclick="showProducts()">View Products</div>
</div>

<div class="products" id="products">
  <h2>Products</h2>

  <div class="product" data-type="Shorts">Shorts Product</div>
  <div class="product" data-type="Hoodies">Hoodie Product</div>
  <div class="product" data-type="Beanies">Beanie Product</div>
</div>

<footer>
  © 2026 Eight Studios
</footer>

<script>
function showProducts() {
  document.getElementById("products").style.display = "block";
}

function filter(type) {
  showProducts();

  let items = document.querySelectorAll(".product");

  items.forEach(item => {
    item.style.display = item.dataset.type === type ? "block" : "none";
  });
}
</script>

</body>
</html>
