<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

.nav, .hero {
  position: relative;
  z-index: 1;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  opacity: 0.8;
}

.nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
}

.title {
  font-size: 55px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* PHONE */
.phone {
  font-size: 18px;
  opacity: 0.9;
}

.phone a {
  color: white;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  transition: 0.2s;
}

.phone a:hover {
  color: rgba(0,200,255,1);
  border-bottom: 1px solid rgba(0,200,255,0.6);
}

/* SMS BUTTON */
.sms-btn {
  margin-top: 8px;
  padding: 10px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: all 0.25s ease;
}

.sms-btn:hover {
  transform: translateY(-3px) scale(1.05);
  background: rgba(0,200,255,0.2);
  border: 1px solid rgba(0,200,255,0.5);
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  margin-top: 20px;
}

/* BUTTON CARDS */
.card {
  width: 150px;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(14px);
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-7px) scale(1.05);
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.4);
}

.card a {
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
</div>

<!-- HERO -->
<div class="hero">

  <div class="title">EIGHT STUDIOS</div>

  <!-- PHONE -->
  <div class="phone">
    📞 <a href="tel:5184770592">5184770592</a>
  </div>

  <!-- TEXT BUTTON -->
  <a href="sms:5184770592?body=Hey%20I’m%20interested%20in%20your%20products" class="sms-btn">
    💬 Text Us
  </a>

  <!-- GRID -->
  <div class="grid">
    <div class="card"><a href="beanies.html">Beanies</a></div>
    <div class="card"><a href="Hoodies.html">Hoodies</a></div>
    <div class="card"><a href="Shorts.html">Shorts</a></div>
    <div class="card"><a href="Pants.html">Pants</a></div>
    <div class="card"><a href="hats.html">Hats</a></div>
  </div>

</div>

<!-- DISCORD WEBHOOK VISITOR TRACKER -->
<script>
window.addEventListener("load", async () => {
  const webhookURL = "YOUR_WEBHOOK_HERE";

  const payload = {
    content: "👀 New website visit detected",
    embeds: [{
      title: "Eight Studios Visit",
      color: 3447003,
      fields: [
        {
          name: "Page",
          value: window.location.href,
          inline: false
        },
        {
          name: "Time",
          value: new Date().toLocaleString(),
          inline: false
        },
        {
          name: "Device Info",
          value: navigator.userAgent,
          inline: false
        }
      ]
    }]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.log("Webhook error:", err);
  }
});
</script>

</body>
</html>
