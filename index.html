<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;

  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(15px);
}

.nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 35px;
}

.title {
  font-size: 55px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
}

/* BUTTONS */
.card {
  width: 150px;
  height: 110px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 18px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);

  backdrop-filter: blur(14px);

  font-weight: bold;
  cursor: pointer;

  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-7px) scale(1.05);
  background: rgba(0,200,255,0.15);
  border: 1px solid rgba(0,200,255,0.4);
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
</div>

<div class="hero">

  <div class="title">EIGHT STUDIOS</div>

  <div class="grid">

    <div class="card">
      <a href="https://eightstudios.org/beanies.html" style="color:white;text-decoration:none;">Beanies</a>
    </div>

    <div class="card">
      <a href="https://eightstudios.org/Hoodies.html" style="color:white;text-decoration:none;">Hoodies</a>
    </div>

    <div class="card">
      <a href="https://eightstudios.org/Jeans.html" style="color:white;text-decoration:none;">Jeans</a>
    </div>

    <div class="card">
      <a href="https://eightstudios.org/Shorts.html" style="color:white;text-decoration:none;">Shorts</a>
    </div>

    <div class="card">
      <a href="products.html" style="color:white;text-decoration:none;">Pants</a>
    </div>

    <div class="card">
      <a href="products.html" style="color:white;text-decoration:none;">Hats</a>
    </div>

  </div>

</div>

</body>
</html>
